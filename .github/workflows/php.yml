name: IDMarinas Seo Bundle Test Suite

permissions:
  contents: read
  pull-requests: write

on:
  pull_request:
    branches: [ 1.x ]
    types: [ opened, synchronize, reopened ]
    tags-ignore: [ dependencies, documentation, meta, 'docker configuration', 'deployer configuration' ]
  push:
    branches: [ 1.x ]
    paths-ignore:
      - '.deployer/**'
      - '.docker/**'
      - '.idea/**'
      - 'migrations/**'
      - '**/docs/**'
      - '**/Writerside/**'
      - '**/*.md'
      - '**/LICENSE'
      - rector.php
      - .editorconfig
      - .gitignore
      - compose.yaml

jobs:
  build:
    runs-on: ubuntu-latest
    name: PHP ${{ matrix.php }} and Symfony ${{ matrix.symfony }}
    strategy:
      matrix:
        php: [ '8.3', '8.4', '8.5' ]
        symfony: [ '6.4.*', '7.1.*', '7.2.*', '7.3.*', '7.4.*', '8.0.*' ]

        exclude:
          - php: '8.3'
            symfony: '8.0.*'

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: ${{ (matrix.php == '8.3' && matrix.symfony == '6.4.*') && '0' || '1' }}

      - name: Setup PHP ${{ matrix.php }}
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          tools: flex

      - name: Download dependencies
        env:
          SYMFONY_REQUIRE: ${{ matrix.symfony }}
          COMPOSER_NO_SECURITY_BLOCKING: 1
        uses: ramsey/composer-install@v3

      # # Uncomment if need create a SQLite Database
      # - name: Create Database SQLite
      #   run: 'php bin/console doctrine:schema:create --env=test && php bin/console doctrine:fixtures:load --env=test -n'

      - name: Run test suite on PHP ${{ matrix.php }} and Symfony ${{ matrix.symfony }}
        run: ./vendor/bin/phpunit --exclude-group ignore

      # # Uncomment to activate SonarCloud Scan
      - name: SonarCloud Scan
        if: matrix.php == '8.3' && matrix.symfony == '6.4.*'
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}  # Needed to get PR information, if any
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
